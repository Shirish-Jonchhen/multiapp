name: multiapp
description: Flutter showcase app with 5 features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Code Generation (Freezed)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation

  # Local Storage
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.4

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Notifications
  flutter_local_notifications: ^19.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.0
  permission_handler: ^11.3.1

  # Functional Programming (Either / failures)
  dartz: ^0.10.1

  # Image Loading
  cached_network_image: ^3.4.1

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.4.4

  # UI Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  auto_route: ^9.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  auto_route_generator: ^9.0.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/
